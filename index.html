<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химчистка мебели | Заявка</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin: 12px 0 5px; font-size: 14px; color: #666; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; min-height: 24px; }
        .consent { display: flex; align-items: flex-start; gap: 10px; margin-top: 15px; font-size: 12px; color: #888; }
        .consent input { width: auto; margin-top: 3px; }

        /* Стили модального окна */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal {
            background: white; padding: 40px; border-radius: 20px; text-align: center;
            max-width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: scaleUp 0.3s ease;
        }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal h3 { margin-top: 0; color: #2ecc71; font-size: 24px; }
        .order-num { font-size: 48px; font-weight: 800; color: #333; margin: 20px 0; letter-spacing: 2px; }
        .modal p { color: #666; line-height: 1.5; }
        .modal-btn { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 20px; }



        .suggestions-container {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none; /* По умолчанию скрыт */
        }
        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
        }
        .suggestion-item:hover {
            background: #f0f8ff;
        }
        .address-wrapper {
            position: relative; /* Контейнер для позиционирования списка */
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/css/suggestions.min.css" rel="stylesheet" />

    <script src="https://cdn.jsdelivr.net/npm/suggestions-jquery@21.12.0/dist/js/suggestions-jquery.min.js"></script>

    
</head>
<body>

<div class="card">
    <h2>Заявка на химчистку мебели</h2>
    <form id="order-form">
        <label>Ваше имя</label>
        <input type="text" name="name" placeholder="Имя" required>

        <label>Телефон</label>
        <input type="tel" name="phone" id="phone" placeholder="8 (9XX) XXX-XX-XX" required>

        <div class="address-wrapper">
            <label>Адрес</label>
            <input type="text" id="address" autocomplete="off" placeholder="Адрес в Тюмени">
            <div id="address-suggestions" class="suggestions-container"></div>
        </div>

        <label>Что чистим?</label>
        <select name="service" required>
            <option value="">Выберите услугу...</option>
            <option value="Диван">Диван</option>
            <option value="Матрас">Матрас</option>
            <option value="Кресло">Кресло</option>
            <option value="Ковер">Ковер</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Дата</label>
                <input type="date" name="date" id="order-date" required>
            </div>
            <div style="flex: 1;">
                <label>Время</label>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <select id="hours" name="hour" required style="padding: 10px; flex: 1;">
                        <option value="">Час</option>
                    </select>
                    <span>:</span>
                    <select id="minutes" name="minute" required style="padding: 10px; flex: 1;">
                        <option value="">Мин</option>
                        <option value="00">00</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <label>Фото мебели для оценки (до 3-х)</label>
        <input type="file" id="image" accept="image/*" multiple>

        <label>Комментарий</label>
        <textarea name="message" rows="2" placeholder="Укажите тип загрязнения или вопрос"></textarea>

        <div class="consent">
            <input type="checkbox" id="check" checked required>
            <label for="check">Согласен на обработку данных</label>
        </div>

        
        <div style="display:none;">
            <input type="text" name="honeypot" id="honeypot" tabindex="-1" autocomplete="off">
        </div>

        <button type="submit" id="submit-btn">Записаться</button>
    </form>
    <div id="status"></div>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal">
        <h3>Заказ принят!</h3>
        <p>Ваш номер заказа:</p>
        <div class="order-num" id="displayOrderNum">0000</div>
        <p>Мастер свяжется с вами в течение 15 минут для подтверждения.</p>
        <button class="modal-btn" onclick="closeModal()">Отлично</button>
    </div>
</div>



<script>
    // --- НАСТРОЙКИ ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxQ0EXKPEFODoeTmOL0_USqA_orSmhwP6jTtwOymAbYVuLSC3rMs0ODoM_Eyg1vDt3shQ/exec';
    
    const pageLoadTime = Date.now();
    const form = document.getElementById('order-form');
    const status = document.getElementById('status');
    const btn = document.getElementById('submit-btn');
    const phoneInput = document.getElementById('phone');
    const hourSelect = document.getElementById('hours');
    const minuteSelect = document.getElementById('minutes');
    const dateInput = document.getElementById('order-date');

    // --- 1. ФУНКЦИИ ДАТЫ И ВРЕМЕНИ ---

    // Правильная дата без смещения часовых поясов
    const getLocalDateStr = () => {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    };

    async function updateAvailableHours() {
        const selectedDate = dateInput.value;
        if (!selectedDate) return;

        const now = new Date();
        const todayStr = getLocalDateStr();
        const cutoffHour = now.getHours() + 2;

        // Очистка и заполнение базы (8:00 - 20:00)
        hourSelect.innerHTML = '<option value="">Час</option>';
        for (let i = 8; i <= 20; i++) {
            if (selectedDate > todayStr || i >= cutoffHour) {
                let h = i < 10 ? '0' + i : i.toString();
                let opt = document.createElement('option');
                opt.value = h; opt.textContent = h;
                hourSelect.appendChild(opt);
            }
        }

        // Блокировка занятых слотов
        try {
            const response = await fetch(`${scriptURL}?t=${Date.now()}`);
            const bookedSlots = await response.json();
            
            console.log("Занятые слоты:", bookedSlots); // Проверь в консоли (F12)

            Array.from(hourSelect.options).forEach(opt => {
                if (!opt.value) return;
                
                const currentHour = parseInt(opt.value);
                
                // Проверяем, есть ли совпадения в занятых слотах
                const isBooked = bookedSlots.some(slot => {
                    // Теперь оба значения — это просто строки "YYYY-MM-DD"
                    if (slot.date !== selectedDate) return false;

                    const bookedHour = parseInt(slot.time.split(':')[0]);
                    // Блокируем выбранный час и соседние
                    return (currentHour >= bookedHour - 1 && currentHour <= bookedHour + 1);
                });

                if (isBooked) {
                    opt.disabled = true;
                    opt.textContent = opt.value + " (занято)";
                    opt.style.backgroundColor = "#ffebee"; // Бледно-красный
                    opt.style.color = "#999";
                }
            });
        } catch (e) { 
            console.error("Ошибка синхронизации слотов:", e); 
        }
    }

    // --- 2. МАСКА И АВТОМАТИКА ---

    phoneInput.addEventListener('input', (e) => {
        let val = phoneInput.value.replace(/\D/g, '');
        if (val.startsWith('7')) val = '8' + val.substring(1);
        if (val && !val.startsWith('8')) val = '8' + val;
        
        let res = '8';
        if (val.length > 1) res += ' (' + val.substring(1, 4);
        if (val.length > 4) res += ') ' + val.substring(4, 7);
        if (val.length > 7) res += '-' + val.substring(7, 9);
        if (val.length > 9) res += '-' + val.substring(9, 11);
        phoneInput.value = res.substring(0, 18);
    });

    hourSelect.addEventListener('change', () => {
        if (hourSelect.value && !minuteSelect.value) minuteSelect.value = "00";
    });

    // --- 3. ОБРАБОТКА ФОТО ---

    const getFilesData = async (files) => {
        const promises = Array.from(files).slice(0, 3).map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 1200;
                        if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
                        else if (h > MAX) { w *= MAX/h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve({ data: canvas.toDataURL('image/jpeg', 0.7).split(',')[1], name: file.name });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
        return Promise.all(promises);
    };

    // --- 4. ОТПРАВКА ---

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. Защита от спама
        if (document.getElementById('honeypot').value || (Date.now() - pageLoadTime) < 4000) {
            alert("Ошибка безопасности. Попробуйте снова через пару секунд.");
            return;
        }

        // 2. Проверка фото
        const files = document.getElementById('image').files;
        if (files.length > 3) { return alert("Максимум 3 фото!"); }

        // 3. Визуал "Загрузка"
        btn.disabled = true;
        status.style.color = "blue";
        status.textContent = "⏳ Отправка заказа...";

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        data.time = `${data.hour}:${data.minute}`;

        if (files.length > 0) {
            data.filesJSON = JSON.stringify(await getFilesData(files));
        }

        try {
            // Убираем no-cors, чтобы прочитать JSON с номером заказа
            const response = await fetch(scriptURL, { 
                method: 'POST', 
                body: new URLSearchParams(data) 
            });
            
            const result = await response.json();

            if (result.result === 'success') {
                status.textContent = ""; // Очищаем статусную строку
                
                // Показываем красивое окно с реальным номером заказа
                showModal(result.orderNumber);
                
                // Очистка формы
                form.reset();
                dateInput.value = getLocalDateStr();
                updateAvailableHours();
                btn.disabled = false;
            } else {
                throw new Error(result.error);
            }
            
        } catch (err) {
            console.error(err);
            status.style.color = "red";
            status.textContent = "❌ Ошибка при отправке. Попробуйте еще раз.";
            btn.disabled = false;
        }
    });


    function showModal(orderNumber) {
    const modal = document.getElementById('orderModal');
    document.getElementById('displayOrderNum').textContent = orderNumber;
    modal.style.display = 'flex';
}

    function closeModal() {
        const modal = document.getElementById('orderModal');
        modal.style.display = 'none';
    }




const addressInput = document.getElementById('address');
const suggestionsBox = document.getElementById('address-suggestions');
const API_TOKEN = "5093f898045bde0c376afa1c9a96e738c4549be6";

addressInput.addEventListener('input', async function() {
    const query = this.value;
    if (query.length < 3) {
        suggestionsBox.style.display = 'none';
        return;
    }

    try {
        const response = await fetch("https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address", {
            method: "POST",
            mode: "cors",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Authorization": "Token " + API_TOKEN
            },
            body: JSON.stringify({ 
                query: query, 
                count: 5,
                // Ограничиваем поиск только улицами и домами внутри Тюмени
                from_bound: { value: "street" }, 
                to_bound: { value: "house" }, 
                locations: [{ "city": "Тюмень" }],
                restrict_value: true 
            })
        });

        const result = await response.json();
        showSuggestions(result.suggestions);
    } catch (error) {
        console.error("Ошибка DaData:", error);
    }
});

function showSuggestions(list) {
    if (!list.length) {
        suggestionsBox.style.display = 'none';
        return;
    }

    suggestionsBox.innerHTML = '';
    list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = item.value;
        
        div.onclick = function(e) {
            e.stopPropagation(); // Чтобы клик не всплывал к документу
            
            addressInput.value = item.value;
            
            // ПРОВЕРКА: Если в выбранном адресе есть дом (house), тогда закрываем.
            // Если дома нет — оставляем список открытым для уточнения.
            if (item.data.house) {
                suggestionsBox.style.display = 'none';
            } else {
                // Добавляем пробел в конце, чтобы пользователь сразу вводил номер дома
                addressInput.value += " "; 
                // Возвращаем фокус и вызываем поиск снова
                addressInput.focus();
                addressInput.dispatchEvent(new Event('input'));
            }
        };
        suggestionsBox.appendChild(div);
    });

    suggestionsBox.style.display = 'block';
}

// Скрывать список, если кликнули мимо
document.addEventListener('click', (e) => {
    if (e.target !== addressInput && e.target !== suggestionsBox) {
        suggestionsBox.style.display = 'none';
    }
});





    // Старт
    dateInput.min = getLocalDateStr();
    dateInput.value = getLocalDateStr();
    dateInput.addEventListener('change', updateAvailableHours);
    updateAvailableHours();



</script>

</body>
</html>
