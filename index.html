<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химчистка мебели | Заявка</title>
    <style>

        /* Анимация бегающих точек */
        .loading-dots::after {
        content: '.';
        animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
        0%, 20% { content: '.'; }
        40% { content: '..'; }
        60% { content: '...'; }
        80%, 100% { content: ''; }
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin: 12px 0 5px; font-size: 14px; color: #666; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; min-height: 24px; }
        .consent { display: flex; align-items: flex-start; gap: 10px; margin-top: 15px; font-size: 12px; color: #888; }
        .consent input { width: auto; margin-top: 3px; }

        /* Модальное окно */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: white; padding: 40px; border-radius: 20px; text-align: center; max-width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: scaleUp 0.3s ease; }
        @keyframes scaleUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .order-num { font-size: 48px; font-weight: 800; color: #333; margin: 20px 0; }
        
        /* Стили DaData и Адреса */
        .address-wrapper { position: relative; width: 100%; }
        .address-row { display: flex; gap: 5px; }
        .suggestions-container {
            position: absolute; top: 100%; left: 0; background: white; border: 1px solid #ccc;
            width: 100%; max-height: 200px; overflow-y: auto; z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; margin-top: 2px;
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
        .suggestion-item:hover { background: #f0f8ff; }

        .date-suggest-btn {
            background: #f0f7ff;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px 0;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            width: 80%; /* Чтобы кнопки были аккуратными в столбик */
        }

        .date-suggest-btn:hover {
            background: #007bff;
            color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Заявка на химчистку</h2>
    <form id="order-form">
        <label>Ваше имя</label>
        <input type="text" name="name" placeholder="Имя" required>

        <label>Телефон</label>
        <input type="tel" id="phone" name="phone" placeholder="8 (9XX) XXX-XX-XX" required>

        <label>Адрес</label>
        <div class="address-row">
            <div class="address-wrapper">
                <input type="text" id="address" name="address" placeholder="Адрес в Тюмени" required autocomplete="off">
                <div id="address-suggestions" class="suggestions-container"></div>
            </div>
            <input type="number" id="flat" name="flat" placeholder="Кв / Офис" style="width: 110px;">
        </div>

        <label>Что чистим?</label>
        <select name="service" required>
            <option value="">Выберите услугу...</option>
            <option value="Диван">Диван</option>
            <option value="Матрас">Матрас</option>
            <option value="Кресло">Кресло</option>
            <option value="Ковер">Ковер</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Дата</label>
                <input type="date" id="order-date" name="date" required>
            </div>
            <div style="flex: 1;">
                <label>Время</label>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <select id="hours" name="hour" required><option value="">Час</option></select>
                    <span>:</span>
                    <select id="minutes" name="minute" required>
                        <option value="">Мин</option>
                        <option value="00">00</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <label>Фото мебели (до 3-х)</label>
        <input type="file" id="image" accept="image/*" multiple>

        <label>Комментарий</label>
        <textarea name="message" rows="2" placeholder="Укажите особенности..."></textarea>

        <div class="consent">
            <input type="checkbox" id="check" checked required>
            <label for="check">Согласен на обработку данных</label>
        </div>

        <div style="display:none;"><input type="text" id="honeypot" name="honeypot"></div>
        <button type="submit" id="submit-btn">Записаться</button>
    </form>
    <div id="status"></div>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal">
        <div id="modal-icon" style="font-size: 50px; margin-bottom: 10px;"></div>
        <h3 id="modal-title"></h3>
        <p id="modal-text"></p>
        <div id="modal-extra" style="margin: 15px 0;"></div>
        <button id="modal-btn" onclick="closeModal()" style="background:#007bff; color:white; border:none; padding:12px 25px; border-radius:8px; cursor:pointer; font-weight:600;">Понятно</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxQ0EXKPEFODoeTmOL0_USqA_orSmhwP6jTtwOymAbYVuLSC3rMs0ODoM_Eyg1vDt3shQ/exec';
    const API_TOKEN = "5093f898045bde0c376afa1c9a96e738c4549be6";
    
    const form = document.getElementById('order-form');
    const status = document.getElementById('status');
    const btn = document.getElementById('submit-btn');
    const dateInput = document.getElementById('order-date');
    const hourSelect = document.getElementById('hours');
    const addressInput = document.getElementById('address');
    const suggestionsBox = document.getElementById('address-suggestions');
    const pageLoadTime = Date.now();

    // 1. Управление датами и временем
    const getLocalDateStr = () => new Date().toISOString().split('T')[0];

    async function updateAvailableHours() {
    const selectedDate = dateInput.value;
    if (!selectedDate) return;

    // --- Анимация загрузки ---
    let dots = "";
    const loadingInterval = setInterval(() => {
        dots = dots.length >= 3 ? "" : dots + ".";
        hourSelect.innerHTML = `<option value="">Загрузка${dots}</option>`;
    }, 400); 
    // -------------------------

    try {
        const response = await fetch(`${scriptURL}?t=${Date.now()}`);
        const bookedSlots = await response.json();
        
        clearInterval(loadingInterval);
        hourSelect.innerHTML = '<option value="">Час</option>';

        // 1. ПРОВЕРКА НА ПОЛНУЮ БЛОКИРОВКУ ДНЯ
        const isFullDayBlocked = bookedSlots.some(slot => slot.date === selectedDate && slot.time === "Весь день");
        
        if (isFullDayBlocked) {
            // ФУНКЦИЯ ПОИСКА БЛИЖАЙШИХ СВОБОДНЫХ ДАТ
            // Превращаем "2026-03-27" в "27 марта" для текста ошибки
            const formattedSelectedDate = new Date(selectedDate).toLocaleDateString('ru-RU', { 
                day: 'numeric', 
                month: 'long' 
            });
            
            const findNearby = (direction) => {
            let current = new Date(selectedDate);
            for (let i = 1; i <= 10; i++) {
                current.setDate(current.getDate() + direction);
                let dateStr = current.toISOString().split('T')[0];
                let isBlocked = bookedSlots.some(s => s.date === dateStr && s.time === "Весь день");
                let today = new Date();
                today.setHours(0,0,0,0);
                
                if (!isBlocked && current >= today) {
                    return {
                        raw: dateStr, // "2026-03-28"
                        nice: current.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' }) // "28 марта"
                    };
                }
            }
            return null;
        };

        const prev = findNearby(-1);
        const next = findNearby(1);
        
        let advice = "<b>Ближайшие свободные даты:</b><br><div style='margin-top:10px;'>";
        
        // Создаем кликабельные кнопки прямо в строке
        if (prev) {
            advice += `<button type="button" class="date-suggest-btn" onclick="selectSuggestedDate('${prev.raw}')">⬅️ ${prev.nice}</button><br>`;
        }
        if (next) {
            advice += `<button type="button" class="date-suggest-btn" onclick="selectSuggestedDate('${next.raw}')">➡️ ${next.nice}</button>`;
        }
        advice += "</div>";

            // Вызываем наше красивое модальное окно вместо alert
            showModal(
                "День занят", 
                `К сожалению, на <b>${formattedSelectedDate}</b> запись невозможна.`, 
                "error", 
                advice
            );

            dateInput.value = ""; // Сбрасываем дату
            hourSelect.innerHTML = '<option value="">Выберите дату...</option>';
            return;
        }

        // 2. ОТРИСОВКА ДОСТУПНЫХ ЧАСОВ (если день не заблокирован)
        const now = new Date();
        const todayStr = getLocalDateStr();
        const cutoffHour = now.getHours() + 2;

        for (let i = 8; i <= 20; i++) {
            let hStr = i.toString().padStart(2, '0');
            
            // Проверка: не прошло ли время (для сегодняшнего дня)
            if (selectedDate > todayStr || i >= cutoffHour) {
                
                // Проверка занятости конкретного слота (+-1 час от существующих заказов)
                const isBooked = bookedSlots.some(slot => {
                    if (slot.date !== selectedDate) return false;
                    const bookedHour = parseInt(slot.time.split(':')[0]);
                    return (i >= bookedHour - 1 && i <= bookedHour + 1);
                });

                let opt = document.createElement('option');
                opt.value = hStr;
                opt.textContent = isBooked ? `${hStr} (занято)` : `${hStr}`;
                
                if (isBooked) { 
                    opt.disabled = true; 
                    opt.style.color = "#ccc"; 
                }
                hourSelect.appendChild(opt);
            }
        }

        // Если после фильтрации список часов пуст (например, вечер текущего дня)
        if (hourSelect.options.length <= 1) {
            hourSelect.innerHTML = '<option value="">На сегодня записей нет</option>';
        }

    } catch (e) {
        clearInterval(loadingInterval);
        hourSelect.innerHTML = '<option value="">Ошибка загрузки</option>';
        console.error("Ошибка синхронизации:", e);
    }
}

    // Управление модальным окном
    function showModal(title, text, type = 'success', extraHtml = '', orderNum = null) {
    const modal = document.getElementById('orderModal');
    const titleEl = document.getElementById('modal-title');
    const textEl = document.getElementById('modal-text');
    const iconEl = document.getElementById('modal-icon');
    const extraEl = document.getElementById('modal-extra');
    const btn = document.getElementById('modal-btn');
    const orderNumDisplay = document.getElementById('displayOrderNum');

    // Заполняем данные
    titleEl.textContent = title;
    textEl.innerHTML = text; // Используем innerHTML на случай, если в тексте будут <br>
    extraEl.innerHTML = extraHtml;
    
    if (type === 'error') {
        iconEl.textContent = '📅';
        titleEl.style.color = '#e74c3c';
        if (orderNumDisplay) orderNumDisplay.style.display = 'none'; // Скрываем блок номера, если это ошибка
        btn.onclick = () => { modal.style.display = 'none'; };
    } else {
        iconEl.textContent = '✅';
        titleEl.style.color = '#2ecc71';
        
        // Если передан номер заказа — показываем его в твоем красивом поле
        if (orderNum && orderNumDisplay) {
            orderNumDisplay.textContent = orderNum;
            orderNumDisplay.style.display = 'block';
        }
        
        // Сбрасываем форму только при успехе
        document.getElementById('order-form').reset();
        
        // Кнопка "Отлично" при успехе перезагружает страницу для чистоты
        btn.onclick = () => { location.reload(); };
    }
    
    modal.style.display = 'flex';
}

    function closeModal() {
        document.getElementById('orderModal').style.display = 'none';
    }

    // 2. DaData Подсказки
    addressInput.addEventListener('input', async function() {
        if (this.value.length < 3) { suggestionsBox.style.display = 'none'; return; }
        try {
            const resp = await fetch("https://suggestions.dadata.ru/suggestions/api/4_1/rs/suggest/address", {
                method: "POST", headers: { "Content-Type": "application/json", "Accept": "application/json", "Authorization": "Token " + API_TOKEN },
                body: JSON.stringify({ query: this.value, count: 5, from_bound: {value: "street"}, to_bound: {value: "house"}, locations: [{"city": "Тюмень"}], restrict_value: true })
            });
            const res = await resp.json();
            const filtered = res.suggestions.filter(s => s.data.street);
            
            suggestionsBox.innerHTML = '';
            filtered.forEach(s => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                div.textContent = s.value;
                div.onclick = () => {
                    addressInput.value = s.value;
                    if (s.data.house) {
                        suggestionsBox.style.display = 'none';
                        addressInput.style.borderColor = "#28a745";
                    } else {
                        addressInput.value += ", ";
                        addressInput.focus();
                        addressInput.dispatchEvent(new Event('input'));
                    }
                };
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = filtered.length ? 'block' : 'none';
        } catch (e) { console.log(e); }
    });

    // 3. Сжатие фото (Возвращаем твою логику)
    const getFilesData = async (files) => {
        const promises = Array.from(files).slice(0, 3).map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 1200;
                        if (w > h && w > MAX) { h *= MAX/w; w = MAX; }
                        else if (h > MAX) { w *= MAX/h; h = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve({ data: canvas.toDataURL('image/jpeg', 0.7).split(',')[1], name: file.name });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
        return Promise.all(promises);
    };

    // 4. Отправка формы
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Валидация адреса
        if (!/[а-яА-ЯёЁa-zA-Z]/.test(addressInput.value) || !/\d/.test(addressInput.value)) {
            alert("Пожалуйста, выберите полный адрес из списка или введите улицу и номер дома!");
            addressInput.focus();
            return;
        }

        if (document.getElementById('honeypot').value || (Date.now() - pageLoadTime) < 4000) return;

        btn.disabled = true;
        status.style.color = "blue";
        status.textContent = "⏳ Отправка заказа...";

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        if (data.flat) data.address += `, кв/оф: ${data.flat}`;
        data.time = `${data.hour}:${data.minute}`;

        const fileInput = document.getElementById('image');
        if (fileInput.files.length > 0) {
            data.filesJSON = JSON.stringify(await getFilesData(fileInput.files));
        }

        try {
            const resp = await fetch(scriptURL, { method: 'POST', body: new URLSearchParams(data) });
            const res = await resp.json();
            if (res.result === 'success') {
                // Передаем заголовок, текст, тип "success", пустой доп.контент и сам НОМЕР заказа
                showModal(
                    "Заказ принят!", 
                    "Мастер свяжется с вами в ближайшее время.", 
                    "success", 
                    "", 
                    res.orderNumber
                );
            }
        } catch (err) {
            status.style.color = "red";
            status.textContent = "❌ Ошибка сети. Попробуйте еще раз.";
            btn.disabled = false;
        }
    });

    // Маска телефона
    document.getElementById('phone').addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val.startsWith('7')) val = '8' + val.substring(1);
        if (val && !val.startsWith('8')) val = '8' + val;
        let res = '8';
        if (val.length > 1) res += ' (' + val.substring(1, 4);
        if (val.length > 4) res += ') ' + val.substring(4, 7);
        if (val.length > 7) res += '-' + val.substring(7, 9);
        if (val.length > 9) res += '-' + val.substring(9, 11);
        e.target.value = res.substring(0, 18);
    });


    // Функция для выбора даты прямо из модального окна
    function selectSuggestedDate(dateIso) {
        const dateInput = document.getElementById('order-date');
        dateInput.value = dateIso; // Подставляем дату (например, 2026-03-28)
        closeModal(); // Закрываем окно
        
        // Инициируем обновление часов для новой даты
        // Мы вызываем функцию вручную, так как программное изменение .value не всегда триггерит 'change'
        updateAvailableHours(); 
    }

    // Старт
    dateInput.min = getLocalDateStr();
    dateInput.value = getLocalDateStr();
    dateInput.addEventListener('change', updateAvailableHours);
    updateAvailableHours();
    document.addEventListener('click', (e) => { if (e.target !== addressInput) suggestionsBox.style.display = 'none'; });
</script>
</body>
</html>
