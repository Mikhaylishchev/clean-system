<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Химчистка мебели | Заявка</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { display: block; margin: 12px 0 5px; font-size: 14px; color: #666; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; }
        #status { text-align: center; margin-top: 15px; font-weight: 600; min-height: 24px; }
        .consent { display: flex; align-items: flex-start; gap: 10px; margin-top: 15px; font-size: 12px; color: #888; }
        .consent input { width: auto; margin-top: 3px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Заявка на химчистку мебели</h2>
    <form id="order-form">
        <label>Ваше имя</label>
        <input type="text" name="name" placeholder="Имя" required>

        <label>Телефон</label>
        <input type="tel" name="phone" id="phone" placeholder="8 (9XX) XXX-XX-XX" required>

        <label>Адрес</label>
        <input type="text" name="address" placeholder="ул. Пушкина, д. 10" required>

        <label>Что чистим?</label>
        <select name="service" required>
            <option value="">Выберите услугу...</option>
            <option value="Диван">Диван</option>
            <option value="Матрас">Матрас</option>
            <option value="Кресло">Кресло</option>
            <option value="Ковер">Ковер</option>
        </select>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Дата</label>
                <input type="date" name="date" id="order-date" required>
            </div>
            <div style="flex: 1;">
                <label>Время</label>
                <div style="display: flex; gap: 5px; align-items: center;">
                    <select id="hours" name="hour" required style="padding: 10px; flex: 1;">
                        <option value="">Час</option>
                    </select>
                    <span>:</span>
                    <select id="minutes" name="minute" required style="padding: 10px; flex: 1;">
                        <option value="">Мин</option>
                        <option value="00">00</option>
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="30">30</option>
                        <option value="40">40</option>
                        <option value="50">50</option>
                    </select>
                </div>
            </div>
        </div>

        <label>Фото мебели для оценки (до 3-х)</label>
        <input type="file" id="image" accept="image/*" multiple>

        <label>Комментарий</label>
        <textarea name="message" rows="2" placeholder="Укажите тип загрязнения или вопрос"></textarea>

        <div class="consent">
            <input type="checkbox" id="check" checked required>
            <label for="check">Согласен на обработку данных</label>
        </div>

        
        <div style="display:none;">
            <input type="text" name="honeypot" id="honeypot" tabindex="-1" autocomplete="off">
        </div>

        <button type="submit" id="submit-btn">Записаться</button>
    </form>
    <div id="status"></div>
</div>

<script>
    const pageLoadTime = Date.now();
    const form = document.getElementById('order-form');
    const status = document.getElementById('status');
    const btn = document.getElementById('submit-btn');
    const phoneInput = document.getElementById('phone');
    const hourSelect = document.getElementById('hours');

    // --- НАСТРОЙКИ ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzrFytzL2Lixs0kktayoyQtGPZ3Tc_x_mEuPdwvOG19JVgzgqeV1cfw5djm89nUHVuipg/exec';

    // 1. Заполняем часы (с 8 до 20)
    for (let i = 8; i <= 20; i++) {
        let opt = document.createElement('option');
        let val = i < 10 ? '0' + i : i;
        opt.value = val;
        opt.textContent = val;
        hourSelect.appendChild(opt);
    }

    // 2. Ограничение даты (минимум сегодня)
    document.getElementById('order-date').min = new Date().toISOString().split("T")[0];

    // 3. Маска телефона
    const prefix = '8 (9';
    phoneInput.addEventListener('input', () => {
        let val = phoneInput.value.replace(/\D/g, '');
        if (phoneInput.value.length < prefix.length) { phoneInput.value = prefix; return; }
        let extra = val.substring(2); 
        let formatted = prefix;
        if (extra.length > 0) formatted += extra.substring(0, 2);
        if (extra.length > 2) formatted += ') ' + extra.substring(2, 5);
        if (extra.length > 5) formatted += '-' + extra.substring(5, 7);
        if (extra.length > 7) formatted += '-' + extra.substring(7, 9);
        phoneInput.value = formatted.substring(0, 17);
    });
    phoneInput.addEventListener('focus', () => { if(!phoneInput.value) phoneInput.value = prefix; });

    // 4. Функция сжатия фото (до 3-х штук)
    const getFilesData = async (files) => {
        // Берем только первые 3, если вдруг кто-то выбрал больше
        const selectedFiles = Array.from(files).slice(0, 3);
        const promises = selectedFiles.map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX_SIZE = 1200; // Немного увеличим качество для альбома
                        if (width > height) {
                            if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                        } else {
                            if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        resolve({ data: dataUrl.split(',')[1], name: file.name });
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        });
        return Promise.all(promises);
    };

    // 5. Функция отправки
    async function sendRequest(payload) {
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: new URLSearchParams(payload)
        });

        setTimeout(() => {
            status.style.color = "green";
            status.textContent = "✅ Заказ успешно отправлен!";
            form.reset();
            phoneInput.value = "";
            btn.disabled = false;
            setTimeout(() => { status.textContent = ""; }, 7000);
        }, 2000);
    }

    // 6. ГЛАВНЫЙ ОБРАБОТЧИК
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Проверка на бота
        const honey = document.getElementById('honeypot').value;
        if (honey) {
            console.warn("Бот обнаружен!");
            return; // Просто прерываем выполнение, ничего не отправляем
        }

        const timeFills = (Date.now() - pageLoadTime) / 1000;
        if (timeFills < 4) { // Если прошло меньше 4 секунд
            alert("Слишком быстрая отправка. Пожалуйста, заполните форму внимательнее.");
            return;
        }

        const fileInput = document.getElementById('image');
        
        // --- ПРОВЕРКА КОЛИЧЕСТВА ФАЙЛОВ ---
        if (fileInput.files.length > 3) {
            alert("Ошибка: Вы выбрали " + fileInput.files.length + " фото. Пожалуйста, выберите не более 3-х фотографий.");
            return; // Прекращаем выполнение
        }
        
        if (phoneInput.value.replace(/\D/g, '').length !== 11) {
            alert("Введите полный номер телефона!");
            return;
        }

        btn.disabled = true;
        status.style.color = "blue";
        status.textContent = "⏳ Подготовка фото и отправка...";

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        if (data.hour && data.minute) {
            data.time = `${data.hour}:${data.minute}`;
        }

        // Если есть файлы, сжимаем и добавляем в данные
        if (fileInput.files.length > 0) {
            const filesData = await getFilesData(fileInput.files);
            data.filesJSON = JSON.stringify(filesData);
        }
        
        await sendRequest(data);
    });



    const dateInput = document.getElementById('order-date');
    const hourSelect = document.getElementById('hours');

    // Функция проверки занятого времени
    async function updateAvailableHours() {
        const selectedDate = dateInput.value;
        if (!selectedDate) return;

        hourSelect.innerHTML = '<option value="">Загрузка...</option>';
        
        try {
            const response = await fetch(scriptURL); // doGet срабатывает при обычном GET запросе
            const bookedSlots = await response.json();

            // Очищаем и заново заполняем часы
            hourSelect.innerHTML = '<option value="">Час</option>';
            for (let i = 8; i <= 20; i++) {
                let h = i < 10 ? '0' + i : i.toString();
                let isBooked = false;

                // Проверяем: занят ли этот час или соседние (буфер 1 час)
                bookedSlots.forEach(slot => {
                    if (slot.date === selectedDate) {
                        let bookedHour = parseInt(slot.time.split(':')[0]);
                        let currentHour = parseInt(h);
                        // Блокируем выбранный час + 1 час до и 1 час после
                        if (currentHour >= bookedHour - 1 && currentHour <= bookedHour + 1) {
                            isBooked = true;
                        }
                    }
                });

                let opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                if (isBooked) {
                    opt.disabled = true;
                    opt.textContent += " (занято)";
                }
                hourSelect.appendChild(opt);
            }
        } catch (e) {
            console.error("Ошибка загрузки слотов", e);
        }
    }

    // Вызываем проверку при смене даты
    dateInput.addEventListener('change', updateAvailableHours);
</script>

</body>
</html>
